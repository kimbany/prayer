<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>기도제목</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --card: #161920;
  --card2: #1e2230;
  --border: #2a2f45;
  --text: #eef0f8;
  --muted: #7a7f9a;
  --gold: #c9a84c;
  --gold2: #f0d080;
  --accent: #7b9cff;
  --answered: #4ade80;
  --danger: #ef4444;
  --radius: 18px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; overscroll-behavior: none; }

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(201,168,76,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 10% 80%, rgba(123,156,255,0.06) 0%, transparent 60%);
  pointer-events: none;
}

.app { position: relative; z-index: 1; min-height: 100vh; max-width: 480px; margin: 0 auto; }

/* ── 잠금화면 */
#lockScreen {
  position: fixed; inset: 0; z-index: 9000;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 28px; padding: 40px 32px;
}
.lock-logo { text-align: center; }
.lock-logo-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 30px; font-weight: 700;
  color: var(--gold); letter-spacing: 2px; margin-bottom: 6px;
}
.lock-logo-sub { font-size: 13px; color: var(--muted); letter-spacing: 1px; }
.lock-cross { font-size: 40px; margin-bottom: 4px; }
.lock-box { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 12px; }
#lockLoadingMsg { font-size: 12px; color: var(--muted); text-align: center; padding: 4px 0; }
#offlineMsg {
  display: none;
  background: rgba(239,68,68,0.10); border: 1px solid rgba(239,68,68,0.3);
  border-radius: 12px; padding: 12px 14px;
  font-size: 13px; color: #ef4444; text-align: center; line-height: 1.7;
}
#lockPwInput {
  width: 100%;
  background: var(--card2); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 15px 18px;
  color: var(--text); font-size: 18px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none; text-align: center; letter-spacing: 6px;
  transition: border-color .2s; opacity: 0.5;
}
#lockPwInput:focus { border-color: var(--gold); }
#lockPwInput:not(:disabled) { opacity: 1; }
#lockError { font-size: 12px; color: var(--danger); text-align: center; opacity: 0; transition: opacity .2s; }
#lockBtn {
  width: 100%; padding: 15px;
  border-radius: 14px; border: none;
  background: var(--gold); color: #0d0f14;
  font-size: 15px; font-weight: 900;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  letter-spacing: 1px; opacity: 0.5;
  transition: opacity .2s, transform .1s;
}
#lockBtn:not(:disabled):active { transform: scale(0.97); }

/* ── 헤더 */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,15,20,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 0;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.logo { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
.logo span { color: var(--text); font-weight: 400; font-size: 13px; margin-left: 6px; }
#syncStatus { font-size: 11px; font-weight: 700; color: var(--answered); opacity: 0; transition: opacity .5s; }
.view-tabs { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
.view-tabs::-webkit-scrollbar { display: none; }
.view-tab {
  flex-shrink: 0; padding: 9px 14px;
  font-size: 13px; font-weight: 700;
  color: var(--muted); border-bottom: 2px solid transparent;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.view-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── 공통 */
.classes-wrap { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.card-header {
  padding: 14px 16px;
  background: var(--card2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 15px; font-weight: 900; }
.card-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

.inp-label { font-size: 11px; color: var(--muted); font-weight: 700; display: block; margin-bottom: 5px; margin-top: 12px; letter-spacing: .5px; }
.inp {
  width: 100%; background: var(--card2); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 11px 13px;
  color: var(--text); font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif; outline: none;
  transition: border-color .2s;
}
.inp:focus { border-color: var(--gold); }
textarea.inp { resize: none; line-height: 1.7; }

.btn {
  flex: 1; padding: 12px; border-radius: 12px; border: none;
  font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  transition: opacity .15s, transform .1s;
}
.btn:active { transform: scale(0.97); }
.btn.primary { background: var(--gold); color: #0d0f14; }
.btn.cancel { background: var(--card2); color: var(--muted); border: 1.5px solid var(--border); }
.row-btns { display: flex; gap: 8px; margin-top: 16px; }

.sm-btn {
  padding: 5px 11px; border-radius: 8px; border: none;
  font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
}
.sm-btn.edit { background: rgba(123,156,255,0.15); color: var(--accent); }
.sm-btn.del  { background: rgba(239,68,68,0.12); color: var(--danger); }

.empty { text-align: center; padding: 40px 20px; font-size: 14px; color: var(--muted); line-height: 2; }

/* ── 날짜 선택 바 */
.date-top-bar {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 13px 16px;
  display: flex; align-items: center; gap: 10px;
}
.date-top-bar label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.date-inp-main {
  flex: 1;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 8px 12px;
  color: var(--text); font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif; outline: none;
  transition: border-color .2s;
}
.date-inp-main:focus { border-color: var(--gold); }
.open-session-btn {
  padding: 9px 14px; border-radius: 10px; border: none;
  background: var(--gold); color: #0d0f14;
  font-size: 12px; font-weight: 900;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  white-space: nowrap; transition: opacity .15s, transform .1s;
}
.open-session-btn:active { transform: scale(0.97); }

/* ── 입력 세션 카드 */
.session-card {
  background: var(--card); border: 1.5px solid var(--gold);
  border-radius: var(--radius); overflow: hidden;
}
.session-header {
  background: rgba(201,168,76,0.10);
  border-bottom: 1px solid var(--border);
  padding: 11px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.session-date-label { font-size: 13px; font-weight: 900; color: var(--gold); }
.session-save-btn {
  padding: 7px 18px; border-radius: 9px; border: none;
  background: var(--gold); color: #0d0f14;
  font-size: 13px; font-weight: 900;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  transition: transform .1s;
}
.session-save-btn:active { transform: scale(0.97); }

/* ── 인라인 기도제목 입력 행 */
.prayer-input-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
}
.member-select-mini {
  background: var(--card2); border: 1.5px solid var(--border);
  border-radius: 9px; padding: 8px 8px;
  color: var(--text); font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif; outline: none;
  width: 108px; flex-shrink: 0;
  transition: border-color .2s;
}
.member-select-mini:focus { border-color: var(--gold); }
.prayer-text-mini {
  flex: 1;
  background: var(--card2); border: 1.5px solid var(--border);
  border-radius: 9px; padding: 8px 10px;
  color: var(--text); font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif; outline: none;
  transition: border-color .2s; resize: none; line-height: 1.55;
  min-height: 36px; overflow-y: hidden;
}
.prayer-text-mini:focus { border-color: var(--gold); }
.row-del-btn {
  width: 30px; height: 30px; flex-shrink: 0;
  background: rgba(239,68,68,0.10); border: none;
  border-radius: 8px; color: var(--danger);
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  margin-top: 3px;
}
.add-row-btn {
  width: 100%; padding: 12px;
  border: none; border-top: 1px solid var(--border);
  background: transparent; color: var(--gold);
  font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  transition: background .15s;
}
.add-row-btn:active { background: rgba(201,168,76,0.07); }

/* ── 날짜별 저장 그룹 */
.date-group-label {
  font-size: 11px; font-weight: 900; color: var(--muted);
  letter-spacing: 1px; padding: 2px 0;
}
.saved-prayer-row {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 10px; align-items: flex-start;
}
.saved-prayer-row:last-child { border-bottom: none; }
.saved-member-tag {
  font-size: 11px; font-weight: 700; color: var(--gold);
  background: rgba(201,168,76,0.10); border-radius: 6px;
  padding: 2px 8px; white-space: nowrap; flex-shrink: 0; margin-top: 2px;
}
.saved-prayer-text { font-size: 14px; line-height: 1.6; flex: 1; word-break: break-all; }
.saved-prayer-del {
  flex-shrink: 0; background: transparent; border: none;
  color: var(--border); font-size: 14px; cursor: pointer; padding: 2px 2px;
  line-height: 1; transition: color .15s;
}
.saved-prayer-del:hover, .saved-prayer-del:active { color: var(--danger); }

/* ── 멤버별 */
.member-tab-row {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 16px; border-bottom: 1px solid var(--border);
}
.member-tab-row:last-child { border-bottom: none; }
.member-tab-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--card2); border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.member-tab-info { flex: 1; }
.member-tab-name { font-size: 14px; font-weight: 700; }
.member-tab-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── 멤버별 날짜 구분 행 */
.member-date-row {
  padding: 7px 14px 4px;
  font-size: 11px; font-weight: 900; color: var(--muted);
  letter-spacing: .7px; background: var(--card2);
  border-bottom: 1px solid var(--border);
}

/* ── 오버레이/시트 */
.overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.sheet {
  width: 100%; max-width: 480px; margin: 0 auto;
  background: var(--card); border-radius: 24px 24px 0 0;
  padding: 16px 20px 36px;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
  max-height: 90vh; overflow-y: auto;
}
.overlay.open .sheet { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 16px; }
.sheet-title { font-size: 17px; font-weight: 900; margin-bottom: 16px; color: var(--gold); font-family: 'Noto Serif KR', serif; }

/* ── 설정 탭 */
.setting-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
.setting-header {
  padding: 14px 16px; background: var(--card2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.setting-title { font-size: 14px; font-weight: 900; }
.setting-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── Toast */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--card2); border: 1px solid var(--border);
  padding: 10px 20px; border-radius: 24px;
  font-size: 13px; font-weight: 700;
  opacity: 0; transition: all .25s; z-index: 9999;
  white-space: nowrap; pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.pw-field-row { display: flex; flex-direction: column; gap: 0; }
</style>
</head>
<body>

<!-- 잠금화면 -->
<div id="lockScreen">
  <div class="lock-logo">
    <div class="lock-cross">✝️</div>
    <div class="lock-logo-title">기도제목</div>
    <div class="lock-logo-sub">소그룹 기도 나눔</div>
  </div>
  <div class="lock-box">
    <div id="lockLoadingMsg">🔄 서버 연결 중...</div>
    <div id="offlineMsg">
      📡 인터넷 연결을 확인해주세요<br>
      <span style="font-size:11px;color:#6b7280">온라인 상태에서만 사용 가능해요</span><br>
      <button onclick="location.reload()" style="margin-top:8px;padding:6px 16px;border-radius:8px;border:none;background:#ef4444;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">🔄 다시 시도</button>
    </div>
    <input id="lockPwInput" type="password" placeholder="잠시만 기다려주세요" disabled>
    <div id="lockError">비밀번호가 틀렸어요</div>
    <button id="lockBtn" disabled>🙏 입장하기</button>
  </div>
</div>

<div class="app">
<header>
  <div class="header-top">
    <div class="logo">기도제목 <span>소그룹 나눔</span></div>
    <span id="syncStatus">동기화됨</span>
  </div>
  <div class="view-tabs">
    <div class="view-tab active" id="tab-prayers">🙏 기도제목</div>
    <div class="view-tab"       id="tab-members">👥 멤버별</div>
    <div class="view-tab"       id="tab-settings">⚙ 설정</div>
  </div>
</header>

<div id="view-prayers">
  <div class="classes-wrap" id="prayersWrap"></div>
</div>
<div id="view-members" style="display:none">
  <div class="classes-wrap" id="membersWrap"></div>
</div>
<div id="view-settings" style="display:none">
  <div class="classes-wrap" id="settingsWrap"></div>
</div>
</div>

<!-- 멤버 추가/수정 모달 -->
<div class="overlay" id="memberOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="memberModalTitle">멤버 추가</div>
    <label class="inp-label">이름</label>
    <input class="inp" id="mName" placeholder="홍길동" maxlength="20">
    <label class="inp-label">이모지 아이콘 (선택)</label>
    <input class="inp" id="mEmoji" placeholder="🙂" maxlength="4">
    <div class="row-btns">
      <button class="btn cancel" id="mCancelBtn">취소</button>
      <button class="btn primary" id="mSaveBtn">저장</button>
    </div>
  </div>
</div>

<!-- 비밀번호 변경 모달 -->
<div class="overlay" id="pwChangeOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">🔐 비밀번호 변경</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px;line-height:1.7;">변경하지 않을 항목은 비워두세요.</div>
    <label class="inp-label">현재 비밀번호 확인</label>
    <input class="inp" id="pwCurInput" type="password" placeholder="현재 비밀번호">
    <div id="pwCurError" style="font-size:12px;color:var(--danger);margin-top:4px;opacity:0;transition:opacity .2s">현재 비밀번호가 틀렸어요</div>
    <label class="inp-label">새 비밀번호</label>
    <input class="inp" id="pwNewInput" type="password" placeholder="새 비밀번호">
    <label class="inp-label">새 비밀번호 확인</label>
    <input class="inp" id="pwNewConfirm" type="password" placeholder="새 비밀번호 다시 입력">
    <div id="pwMatchError" style="font-size:12px;color:var(--danger);margin-top:4px;opacity:0;transition:opacity .2s">비밀번호가 일치하지 않아요</div>
    <div class="row-btns">
      <button class="btn cancel" id="pwChangeCancelBtn">취소</button>
      <button class="btn primary" id="pwChangeSaveBtn">저장</button>
    </div>
  </div>
</div>

<!-- 기도제목 수정 모달 -->
<div class="overlay" id="prayerEditOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">✏️ 기도제목 수정</div>
    <label class="inp-label">멤버</label>
    <select class="inp" id="pEditMember"></select>
    <label class="inp-label">날짜</label>
    <input class="inp" id="pEditDate" type="date">
    <label class="inp-label">기도제목</label>
    <textarea class="inp" id="pEditText" rows="4" placeholder="기도 내용을 입력하세요..."></textarea>
    <div class="row-btns">
      <button class="btn cancel" id="pEditCancelBtn">취소</button>
      <button class="btn primary" id="pEditSaveBtn">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAnMcToc5dKI6CQ9Cl_2CG6BTn0bQo-CSk",
  authDomain: "prayer-app-31a26.firebaseapp.com",
  projectId: "prayer-app-31a26",
  databaseURL: "https://prayer-app-31a26-default-rtdb.asia-southeast1.firebasedatabase.app",
  storageBucket: "prayer-app-31a26.firebasestorage.app",
  messagingSenderId: "30199527819",
  appId: "1:30199527819:web:b5b7a6784170995bff178e",
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const ROOT = 'prayer';

let APP_PW = '1234';
let appUnlocked = false;
let currentView = 'prayers';
let isSyncing = false;
let editingMemberId = null;

// 입력 세션 상태
let sessionDate = '';
let sessionRows = []; // [{memberId, text}]
let sessionOpen = false;
let prayerViewDate = ''; // 기도제목 탭에서 선택된 날짜

let S = {
  members: [],
  prayers: [],
  nextId: 1,
};

function saveToStorage(){
  if(isSyncing) return;
  set(ref(db, ROOT), { members: S.members, prayers: S.prayers, nextId: S.nextId, appPw: APP_PW });
}

function showSyncStatus(msg){
  const el = document.getElementById('syncStatus');
  el.textContent = msg; el.style.opacity = '1';
  setTimeout(()=>{ el.style.opacity='0'; }, 2000);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function fmtDate(d){
  if(!d) return '';
  const [y,m,day] = d.split('-');
  return `${y}년 ${+m}월 ${+day}일`;
}
function fmtDateShort(d){
  if(!d) return '';
  const [y,m,day] = d.split('-');
  return `${+m}/${+day}`;
}
function today(){ return new Date().toISOString().slice(0,10); }

// ── VIEW
function setView(v){
  currentView = v;
  ['prayers','members','settings'].forEach(x=>{
    document.getElementById('view-'+x).style.display = x===v ? '' : 'none';
    document.getElementById('tab-'+x).classList.toggle('active', x===v);
  });
  if(v==='prayers')  renderPrayers();
  if(v==='members')  renderMembers();
  if(v==='settings') renderSettings();
}

// ══════════════════════════════════
//  기도제목 뷰
// ══════════════════════════════════
function renderPrayers(){
  const wrap = document.getElementById('prayersWrap');
  wrap.innerHTML = '';

  if(!S.members.length){
    const emp = document.createElement('div');
    emp.className = 'empty';
    emp.innerHTML = '먼저 멤버를 추가해주세요<br><span style="font-size:12px">설정 탭에서 멤버를 등록할 수 있어요</span>';
    wrap.appendChild(emp);
    return;
  }

  // ── 기도제목 추가 버튼
  const addBtn = document.createElement('button');
  addBtn.className = 'open-session-btn';
  addBtn.style.cssText = 'width:100%;padding:13px;border-radius:14px;font-size:14px;letter-spacing:.5px;';
  addBtn.textContent = '✚ 기도제목 추가';
  addBtn.addEventListener('click', ()=>{
    if(!sessionOpen){
      sessionDate = today();
      sessionOpen = true;
      sessionRows = [{memberId: S.members[0]?.id, text:''}];
    }
    renderPrayers();
    setTimeout(()=>{
      const dateEl = document.getElementById('sessionDateInp');
      if(dateEl) dateEl.focus();
    }, 80);
  });
  wrap.appendChild(addBtn);

  // ── 입력 세션 카드
  if(sessionOpen){
    const sessionCard = document.createElement('div');
    sessionCard.className = 'session-card';

    const sessionHdr = document.createElement('div');
    sessionHdr.className = 'session-header';
    sessionHdr.style.flexDirection = 'column';
    sessionHdr.style.gap = '10px';
    sessionHdr.style.alignItems = 'stretch';

    // 날짜 선택 행
    const dateRow = document.createElement('div');
    dateRow.style.cssText = 'display:flex;align-items:center;gap:10px;';
    const dateLblEl = document.createElement('label');
    dateLblEl.textContent = '📅 날짜';
    dateLblEl.style.cssText = 'font-size:12px;color:var(--gold);font-weight:900;white-space:nowrap;';
    const dateInp = document.createElement('input');
    dateInp.type = 'date';
    dateInp.id = 'sessionDateInp';
    dateInp.className = 'date-inp-main';
    dateInp.value = sessionDate || today();
    dateInp.addEventListener('change', ()=>{ sessionDate = dateInp.value; });
    dateRow.appendChild(dateLblEl);
    dateRow.appendChild(dateInp);
    sessionHdr.appendChild(dateRow);

    // 저장 버튼 행
    const saveBtnRow = document.createElement('div');
    saveBtnRow.style.cssText = 'display:flex;gap:8px;';
    const cancelSessionBtn = document.createElement('button');
    cancelSessionBtn.style.cssText = 'flex:1;padding:8px;border-radius:9px;border:1.5px solid var(--border);background:var(--card2);color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;';
    cancelSessionBtn.textContent = '취소';
    cancelSessionBtn.addEventListener('click', ()=>{
      sessionOpen = false; sessionRows = [];
      renderPrayers();
    });
    const saveBtn = document.createElement('button');
    saveBtn.className = 'session-save-btn';
    saveBtn.style.cssText = 'flex:2;';
    saveBtn.textContent = '🙏 저장하기';
    saveBtn.addEventListener('click', saveSession);
    saveBtnRow.appendChild(cancelSessionBtn);
    saveBtnRow.appendChild(saveBtn);
    sessionHdr.appendChild(saveBtnRow);

    sessionCard.appendChild(sessionHdr);

    sessionRows.forEach((row, idx) => {
      sessionCard.appendChild(buildInputRow(row, idx));
    });

    const addRowBtn = document.createElement('button');
    addRowBtn.className = 'add-row-btn';
    addRowBtn.textContent = '＋ 멤버 기도제목 추가';
    addRowBtn.addEventListener('click', ()=>{
      collectSessionRowValues();
      sessionRows.push({memberId: S.members[0]?.id, text:''});
      renderPrayers();
      setTimeout(()=>{
        const inputs = document.querySelectorAll('.prayer-text-mini');
        if(inputs.length) inputs[inputs.length-1].focus();
      }, 80);
    });
    sessionCard.appendChild(addRowBtn);
    wrap.appendChild(sessionCard);
  }

  // ── 최근 날짜의 기도제목만 멤버별로 표시
  const allDates = [...new Set(S.prayers.map(p=>p.date))].sort((a,b)=>b.localeCompare(a));

  if(!allDates.length && !sessionOpen){
    const emp = document.createElement('div');
    emp.className = 'empty';
    emp.innerHTML = '기도제목이 없어요<br><span style="font-size:12px">위 버튼으로 추가해보세요 🙏</span>';
    wrap.appendChild(emp);
    return;
  }

  if(!allDates.length) return;

  // 날짜 선택 UI (드롭다운)
  const dateFilterRow = document.createElement('div');
  dateFilterRow.style.cssText = 'display:flex;align-items:center;gap:10px;';
  const dateFilterLbl = document.createElement('div');
  dateFilterLbl.style.cssText = 'font-size:12px;color:var(--muted);font-weight:700;white-space:nowrap;';
  dateFilterLbl.textContent = '📅 날짜';
  const dateFilterSel = document.createElement('select');
  dateFilterSel.className = 'inp';
  dateFilterSel.style.cssText = 'flex:1;padding:9px 12px;font-size:13px;';
  allDates.forEach(d=>{
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = fmtDate(d);
    if(d === prayerViewDate) opt.selected = true;
    dateFilterSel.appendChild(opt);
  });
  if(!prayerViewDate || !allDates.includes(prayerViewDate)){
    prayerViewDate = allDates[0];
  }
  dateFilterSel.value = prayerViewDate;
  dateFilterSel.addEventListener('change', ()=>{
    prayerViewDate = dateFilterSel.value;
    renderPrayers();
  });
  dateFilterRow.appendChild(dateFilterLbl);
  dateFilterRow.appendChild(dateFilterSel);
  wrap.appendChild(dateFilterRow);

  // 선택된 날짜의 기도제목을 멤버별로
  const targetDate = prayerViewDate;
  const prayersOnDate = S.prayers.filter(p=>p.date===targetDate);

  if(!prayersOnDate.length){
    const emp = document.createElement('div');
    emp.className = 'empty';
    emp.innerHTML = '이 날짜에 기도제목이 없어요';
    wrap.appendChild(emp);
    return;
  }

  // 날짜 헤더 라벨
  const dateLbl = document.createElement('div');
  dateLbl.className = 'date-group-label';
  dateLbl.textContent = fmtDate(targetDate);
  wrap.appendChild(dateLbl);

  // 멤버별로 그룹핑
  S.members.forEach(mem=>{
    const mPrayers = prayersOnDate.filter(p=>p.memberId===mem.id);
    if(!mPrayers.length) return;

    const card = document.createElement('div');
    card.className = 'card';

    const ch = document.createElement('div');
    ch.className = 'card-header';
    ch.innerHTML = `<div class="card-title">${mem.emoji||'🙂'} ${mem.name}</div>`;
    card.appendChild(ch);

    mPrayers.forEach(p=>{
      const row = document.createElement('div');
      row.className = 'saved-prayer-row';

      const txt = document.createElement('div');
      txt.className = 'saved-prayer-text';
      txt.textContent = p.text;

      const delBtn = document.createElement('button');
      delBtn.className = 'saved-prayer-del';
      delBtn.textContent = '✕';
      delBtn.title = '삭제';
      delBtn.addEventListener('click', ()=>{
        if(!confirm('이 기도제목을 삭제할까요?')) return;
        S.prayers = S.prayers.filter(x=>x.id!==p.id);
        saveToStorage();
        renderPrayers();
        showToast('🗑 삭제 완료');
      });

      row.appendChild(txt);
      row.appendChild(delBtn);
      card.appendChild(row);
    });

    wrap.appendChild(card);
  });
}

function buildInputRow(row, idx){
  const rowEl = document.createElement('div');
  rowEl.className = 'prayer-input-row';
  rowEl.dataset.idx = idx;

  const sel = document.createElement('select');
  sel.className = 'member-select-mini';
  S.members.forEach(m=>{
    const opt = document.createElement('option');
    opt.value = m.id;
    opt.textContent = (m.emoji||'🙂') + ' ' + m.name;
    if(m.id === row.memberId) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', ()=>{ sessionRows[idx].memberId = parseInt(sel.value); });

  const txt = document.createElement('textarea');
  txt.className = 'prayer-text-mini';
  txt.placeholder = '기도제목 입력...';
  txt.value = row.text || '';
  txt.addEventListener('input', ()=>{
    sessionRows[idx].text = txt.value;
    txt.style.height = 'auto';
    txt.style.height = Math.min(txt.scrollHeight, 120) + 'px';
  });

  const delBtn = document.createElement('button');
  delBtn.className = 'row-del-btn';
  delBtn.textContent = '✕';
  delBtn.addEventListener('click', ()=>{
    collectSessionRowValues();
    sessionRows.splice(idx, 1);
    if(sessionRows.length === 0) sessionOpen = false;
    renderPrayers();
  });

  rowEl.appendChild(sel);
  rowEl.appendChild(txt);
  rowEl.appendChild(delBtn);
  return rowEl;
}

function collectSessionRowValues(){
  document.querySelectorAll('.prayer-input-row').forEach(rowEl=>{
    const idx = parseInt(rowEl.dataset.idx);
    const sel = rowEl.querySelector('.member-select-mini');
    const txt = rowEl.querySelector('.prayer-text-mini');
    if(sel && txt && sessionRows[idx] !== undefined){
      sessionRows[idx].memberId = parseInt(sel.value);
      sessionRows[idx].text = txt.value;
    }
  });
}

function saveSession(){
  collectSessionRowValues();
  const date = sessionDate || today();
  let added = 0;
  sessionRows.forEach(row=>{
    const text = (row.text||'').trim();
    if(!text) return;
    S.prayers.push({id: S.nextId++, memberId: row.memberId, text, date});
    added++;
  });
  if(!added){ showToast('기도제목을 입력해주세요 🙏'); return; }
  saveToStorage();
  sessionRows = [];
  sessionOpen = false;
  renderPrayers();
  showToast(`🙏 ${added}개 기도제목 저장됨!`);
}

// ══════════════════════════════════
//  멤버별 뷰
// ══════════════════════════════════
let memberViewSort = 'member'; // 'member' | 'date'

function renderMembers(){
  const wrap = document.getElementById('membersWrap');
  wrap.innerHTML = '';

  if(!S.members.length){
    wrap.innerHTML = '<div class="empty">멤버가 없어요<br>설정 탭에서 추가해보세요</div>';
    return;
  }

  // ── 정렬 토글
  const sortRow = document.createElement('div');
  sortRow.style.cssText = 'display:flex;gap:6px;';

  ['member','date'].forEach(mode=>{
    const btn = document.createElement('button');
    btn.style.cssText = `flex:1;padding:10px;border-radius:12px;border:1.5px solid ${memberViewSort===mode?'var(--gold)':'var(--border)'};
      background:${memberViewSort===mode?'rgba(201,168,76,0.12)':'var(--card2)'};
      color:${memberViewSort===mode?'var(--gold)':'var(--muted)'};
      font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;`;
    btn.textContent = mode==='member' ? '👥 멤버별' : '📅 날짜별';
    btn.addEventListener('click', ()=>{ memberViewSort = mode; renderMembers(); });
    sortRow.appendChild(btn);
  });
  wrap.appendChild(sortRow);

  if(!S.prayers.length){
    const emp = document.createElement('div');
    emp.className = 'empty';
    emp.innerHTML = '기도제목이 없어요<br><span style="font-size:12px">기도제목 탭에서 추가해보세요 🙏</span>';
    wrap.appendChild(emp);
    return;
  }

  if(memberViewSort === 'member'){
    // ── 멤버별 정렬
    S.members.forEach(mem=>{
      const prayers = [...S.prayers.filter(p=>p.memberId===mem.id)]
        .sort((a,b)=>b.date.localeCompare(a.date));
      if(!prayers.length) return;

      const card = document.createElement('div');
      card.className = 'card';

      const ch = document.createElement('div');
      ch.className = 'card-header';
      ch.innerHTML = `<div>
        <div class="card-title">${mem.emoji||'🙂'} ${mem.name}</div>
        <div class="card-sub">기도제목 ${prayers.length}개</div>
      </div>`;
      card.appendChild(ch);

      prayers.forEach(p=>{ card.appendChild(makePrayerRow(p, renderMembers)); });
      wrap.appendChild(card);
    });

  } else {
    // ── 날짜별 정렬
    const allDates = [...new Set(S.prayers.map(p=>p.date))].sort((a,b)=>b.localeCompare(a));

    allDates.forEach(date=>{
      const prayersOnDate = S.prayers.filter(p=>p.date===date);
      if(!prayersOnDate.length) return;

      const dateLblEl = document.createElement('div');
      dateLblEl.className = 'date-group-label';
      dateLblEl.textContent = fmtDate(date);
      wrap.appendChild(dateLblEl);

      const card = document.createElement('div');
      card.className = 'card';

      S.members.forEach(mem=>{
        const mPrayers = prayersOnDate.filter(p=>p.memberId===mem.id);
        if(!mPrayers.length) return;

        const memHdrRow = document.createElement('div');
        memHdrRow.className = 'member-date-row';
        memHdrRow.textContent = (mem.emoji||'🙂') + ' ' + mem.name;
        card.appendChild(memHdrRow);

        mPrayers.forEach(p=>{ card.appendChild(makePrayerRow(p, renderMembers)); });
      });

      wrap.appendChild(card);
    });
  }
}

// 기도제목 행 공통 생성 (날짜 앞 + 수정/삭제)
function makePrayerRow(p, onRefresh){
  const row = document.createElement('div');
  row.className = 'saved-prayer-row';
  row.style.alignItems = 'flex-start';
  row.style.gap = '8px';

  // 날짜 태그 (앞에)
  const dateTag = document.createElement('div');
  dateTag.style.cssText = 'font-size:11px;font-weight:700;color:var(--gold);background:rgba(201,168,76,0.10);border-radius:6px;padding:3px 7px;white-space:nowrap;flex-shrink:0;margin-top:2px;';
  dateTag.textContent = fmtDateShort(p.date);

  // 기도제목 텍스트
  const txt = document.createElement('div');
  txt.className = 'saved-prayer-text';
  txt.style.flex = '1';
  txt.textContent = p.text;

  // 버튼 묶음
  const btnWrap = document.createElement('div');
  btnWrap.style.cssText = 'display:flex;gap:4px;flex-shrink:0;margin-top:1px;';

  const editBtn = document.createElement('button');
  editBtn.className = 'sm-btn edit';
  editBtn.textContent = '수정';
  editBtn.addEventListener('click', ()=> openPrayerEditModal(p.id, onRefresh));

  const delBtn = document.createElement('button');
  delBtn.className = 'saved-prayer-del';
  delBtn.style.cssText = 'background:rgba(239,68,68,0.12);border-radius:6px;padding:3px 7px;font-size:12px;font-weight:700;color:var(--danger);border:none;cursor:pointer;';
  delBtn.textContent = '삭제';
  delBtn.addEventListener('click', ()=>{
    if(!confirm('이 기도제목을 삭제할까요?')) return;
    S.prayers = S.prayers.filter(x=>x.id!==p.id);
    saveToStorage(); onRefresh();
    showToast('🗑 삭제 완료');
  });

  btnWrap.appendChild(editBtn);
  btnWrap.appendChild(delBtn);
  row.appendChild(dateTag);
  row.appendChild(txt);
  row.appendChild(btnWrap);
  return row;
}

// ── 기도제목 수정 모달
let editingPrayerId = null;
let editingPrayerRefresh = null;

function openPrayerEditModal(id, onRefresh){
  const p = S.prayers.find(x=>x.id===id);
  if(!p) return;
  editingPrayerId = id;
  editingPrayerRefresh = onRefresh;

  const sel = document.getElementById('pEditMember');
  sel.innerHTML = S.members.map(m=>`<option value="${m.id}" ${p.memberId===m.id?'selected':''}>${m.emoji||'🙂'} ${m.name}</option>`).join('');
  document.getElementById('pEditText').value = p.text;
  document.getElementById('pEditDate').value = p.date || today();
  document.getElementById('prayerEditOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('pEditText').focus(), 300);
}
function closePrayerEditModal(){
  document.getElementById('prayerEditOverlay').classList.remove('open');
}
function savePrayerEdit(){
  const text = document.getElementById('pEditText').value.trim();
  if(!text){ document.getElementById('pEditText').focus(); return; }
  const p = S.prayers.find(x=>x.id===editingPrayerId);
  if(!p) return;
  p.text = text;
  p.memberId = parseInt(document.getElementById('pEditMember').value);
  p.date = document.getElementById('pEditDate').value;
  saveToStorage();
  closePrayerEditModal();
  if(editingPrayerRefresh) editingPrayerRefresh();
  showToast('✏️ 수정 완료!');
}

// ══════════════════════════════════
//  멤버 모달
// ══════════════════════════════════
function openMemberModal(id){
  editingMemberId = id;
  const m = id ? S.members.find(x=>x.id===id) : null;
  document.getElementById('memberModalTitle').textContent = id ? '멤버 수정' : '멤버 추가';
  document.getElementById('mName').value  = m ? m.name  : '';
  document.getElementById('mEmoji').value = m ? (m.emoji||'') : '';
  document.getElementById('memberOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('mName').focus(), 300);
}
function closeMemberModal(){ document.getElementById('memberOverlay').classList.remove('open'); }
function saveMember(){
  const name = document.getElementById('mName').value.trim();
  if(!name){ document.getElementById('mName').focus(); return; }
  const emoji = document.getElementById('mEmoji').value.trim() || '🙂';
  if(editingMemberId){
    const m = S.members.find(x=>x.id===editingMemberId);
    m.name=name; m.emoji=emoji;
    showToast('✏️ 수정 완료!');
  } else {
    S.members.push({id:S.nextId++, name, emoji});
    showToast(`🎉 ${name} 추가됨!`);
  }
  saveToStorage();
  closeMemberModal();
  renderSettings();
}
function deleteMember(id){
  const m = S.members.find(x=>x.id===id);
  if(!m||!confirm(`'${m.name}' 멤버를 삭제할까요?\n기도제목도 함께 삭제됩니다.`)) return;
  S.members = S.members.filter(x=>x.id!==id);
  S.prayers = S.prayers.filter(x=>x.memberId!==id);
  saveToStorage();
  renderSettings();
  showToast('🗑 삭제 완료');
}

// ══════════════════════════════════
//  설정 뷰
// ══════════════════════════════════
function renderSettings(){
  const wrap = document.getElementById('settingsWrap');
  wrap.innerHTML = '';

  const memCard = document.createElement('div');
  memCard.className = 'setting-card';
  const memHdr = document.createElement('div');
  memHdr.className = 'setting-header';
  memHdr.innerHTML = `<div><div class="setting-title">👥 멤버 관리</div><div class="setting-sub">멤버 추가·수정·삭제</div></div>`;
  const addMemBtn = document.createElement('button');
  addMemBtn.className = 'sm-btn edit'; addMemBtn.textContent = '+ 추가';
  addMemBtn.addEventListener('click', ()=>openMemberModal(null));
  memHdr.appendChild(addMemBtn);
  memCard.appendChild(memHdr);

  if(!S.members.length){
    const emp = document.createElement('div');
    emp.style.cssText = 'padding:20px;text-align:center;font-size:13px;color:var(--muted);';
    emp.textContent = '멤버가 없어요';
    memCard.appendChild(emp);
  } else {
    S.members.forEach(m=>{
      const cnt = S.prayers.filter(p=>p.memberId===m.id).length;
      const row = document.createElement('div');
      row.className = 'member-tab-row';
      row.innerHTML = `
        <div class="member-tab-avatar">${m.emoji||'🙂'}</div>
        <div class="member-tab-info">
          <div class="member-tab-name">${m.name}</div>
          <div class="member-tab-sub">기도제목 ${cnt}개</div>
        </div>`;
      const btns = document.createElement('div');
      btns.style.cssText = 'display:flex;gap:6px;';
      const editBtn = document.createElement('button');
      editBtn.className='sm-btn edit'; editBtn.textContent='수정';
      editBtn.addEventListener('click', ()=>openMemberModal(m.id));
      const delBtn = document.createElement('button');
      delBtn.className='sm-btn del'; delBtn.textContent='삭제';
      delBtn.addEventListener('click', ()=>deleteMember(m.id));
      btns.appendChild(editBtn); btns.appendChild(delBtn);
      row.appendChild(btns);
      memCard.appendChild(row);
    });
  }
  wrap.appendChild(memCard);

  const pwCard = document.createElement('div');
  pwCard.className = 'setting-card';
  const pwHdr = document.createElement('div');
  pwHdr.className = 'setting-header';
  pwHdr.innerHTML = `<div><div class="setting-title">🔐 비밀번호</div><div class="setting-sub">앱 접속 비밀번호 변경</div></div>`;
  const pwBtn = document.createElement('button');
  pwBtn.className = 'sm-btn edit'; pwBtn.textContent = '변경';
  pwBtn.addEventListener('click', openPwChangeModal);
  pwHdr.appendChild(pwBtn);
  pwCard.appendChild(pwHdr);
  wrap.appendChild(pwCard);
}

// ── 비밀번호 변경
function openPwChangeModal(){
  document.getElementById('pwCurInput').value = '';
  document.getElementById('pwNewInput').value = '';
  document.getElementById('pwNewConfirm').value = '';
  document.getElementById('pwCurError').style.opacity = '0';
  document.getElementById('pwMatchError').style.opacity = '0';
  document.getElementById('pwChangeOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('pwCurInput').focus(), 300);
}
function closePwChangeModal(){ document.getElementById('pwChangeOverlay').classList.remove('open'); }
function savePwChange(){
  const cur  = document.getElementById('pwCurInput').value;
  const nw   = document.getElementById('pwNewInput').value;
  const conf = document.getElementById('pwNewConfirm').value;
  if(cur !== APP_PW){
    document.getElementById('pwCurError').style.opacity = '1';
    setTimeout(()=>document.getElementById('pwCurError').style.opacity='0', 2000);
    return;
  }
  if(!nw){ closePwChangeModal(); return; }
  if(nw !== conf){
    document.getElementById('pwMatchError').style.opacity = '1';
    setTimeout(()=>document.getElementById('pwMatchError').style.opacity='0', 2000);
    return;
  }
  APP_PW = nw;
  saveToStorage();
  closePwChangeModal();
  showToast('🔐 비밀번호 변경 완료!');
}

// ── 잠금화면
function unlockInput(){
  const inp = document.getElementById('lockPwInput');
  inp.disabled = false; inp.placeholder = '비밀번호 입력'; inp.style.opacity = '1';
  document.getElementById('lockBtn').disabled = false;
  document.getElementById('lockBtn').style.opacity = '1';
  document.getElementById('lockLoadingMsg').style.display = 'none';
  document.getElementById('offlineMsg').style.display = 'none';
  setTimeout(()=>inp.focus(), 100);
}
function showOffline(){
  document.getElementById('lockLoadingMsg').style.display = 'none';
  document.getElementById('offlineMsg').style.display = 'block';
}
function checkLockPw(){
  const val = document.getElementById('lockPwInput').value;
  if(val === APP_PW){
    appUnlocked = true;
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('lockPwInput').value = '';
    setView(currentView);
  } else {
    const err = document.getElementById('lockError');
    err.style.opacity = '1';
    document.getElementById('lockPwInput').value = '';
    document.getElementById('lockPwInput').focus();
    setTimeout(()=>err.style.opacity='0', 2000);
  }
}

// ── Firebase 동기화
function startRealtimeSync(){
  let firstLoad = true;
  const offlineTimer = setTimeout(()=>{ if(firstLoad) showOffline(); }, 10000);

  window.addEventListener('offline', ()=>{
    if(!appUnlocked) showOffline();
    else showToast('📡 인터넷 연결이 끊겼어요');
  });
  window.addEventListener('online', ()=>{
    if(!appUnlocked){
      document.getElementById('offlineMsg').style.display = 'none';
      document.getElementById('lockLoadingMsg').style.display = 'block';
      document.getElementById('lockLoadingMsg').textContent = '🔄 서버 연결 중...';
    } else { showToast('✅ 인터넷 연결 복구됨'); }
  });

  onValue(ref(db, ROOT), (snapshot)=>{
    if(firstLoad){ firstLoad = false; clearTimeout(offlineTimer); }
    const data = snapshot.val();
    if(!data){ unlockInput(); setView('prayers'); return; }
    isSyncing = true;
    S.members = data.members || [];
    S.prayers = data.prayers || [];
    S.nextId  = data.nextId  || S.nextId;
    if(data.appPw) APP_PW = data.appPw;
    isSyncing = false;

    const lockScreen = document.getElementById('lockScreen');
    if(lockScreen && lockScreen.style.display !== 'none') unlockInput();

    if(appUnlocked){
      if(currentView==='prayers')  renderPrayers();
      if(currentView==='members')  renderMembers();
      if(currentView==='settings') renderSettings();
    }
    showSyncStatus('동기화됨');
  });
}

// ── 이벤트
document.getElementById('tab-prayers').addEventListener('click',  ()=>setView('prayers'));
document.getElementById('tab-members').addEventListener('click',  ()=>setView('members'));
document.getElementById('tab-settings').addEventListener('click', ()=>setView('settings'));

document.getElementById('lockBtn').addEventListener('click', checkLockPw);
document.getElementById('lockPwInput').addEventListener('keydown', e=>{ if(e.key==='Enter') checkLockPw(); });

document.getElementById('mCancelBtn').addEventListener('click', closeMemberModal);
document.getElementById('mSaveBtn').addEventListener('click', saveMember);
document.getElementById('mName').addEventListener('keydown', e=>{ if(e.key==='Enter') saveMember(); });
document.getElementById('memberOverlay').addEventListener('click', e=>{ if(e.target===document.getElementById('memberOverlay')) closeMemberModal(); });

document.getElementById('pwChangeCancelBtn').addEventListener('click', closePwChangeModal);
document.getElementById('pwChangeSaveBtn').addEventListener('click', savePwChange);
document.getElementById('pwChangeOverlay').addEventListener('click', e=>{ if(e.target===document.getElementById('pwChangeOverlay')) closePwChangeModal(); });

document.getElementById('pEditCancelBtn').addEventListener('click', closePrayerEditModal);
document.getElementById('pEditSaveBtn').addEventListener('click', savePrayerEdit);
document.getElementById('prayerEditOverlay').addEventListener('click', e=>{ if(e.target===document.getElementById('prayerEditOverlay')) closePrayerEditModal(); });

startRealtimeSync();
</script>
